<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحباً بك - قسم تكنولوجيا المعلومات والاتصالات والذكاء الاصطناعي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Tahoma, Arial;
           background: url('https://tryengineering.org/wp-content/uploads/bigstock-Concept-Of-Programming-Coding-375861967-1024x576.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* تغيير من center إلى flex-end */
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px; /* إضافة مسافة من الأسفل */
        }
        
        .welcome-box {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 380px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(118, 208, 228, 0.2);
            margin-bottom: 50px; /* إضافة مسافة إضافية من الأسفل */
        }
        
        .logo {
            width: 60px;
            height: 60px;
            margin: 0 auto 15px;
            background: linear-gradient(135deg, #2c3e50, #3498db);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
            line-height: 1.4;
        }
        
        p {
            margin-bottom: 20px;
            color: #555;
            line-height: 1.6;
            font-size: 14px;
        }
        
        a {
            display: inline-block;
            padding: 10px 20px;
            background: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
        }
        
        a:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(52, 152, 219, 0.4);
        }
        
        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        
        .feature {
            width: 30%;
            text-align: center;
            margin-bottom: 10px;
        }
        
        .feature-icon {
            font-size: 20px;
            margin-bottom: 5px;
            color: #3498db;
        }
        
        .feature-text {
            font-size: 11px;
            color: #666;
        }
        
        @media (max-width: 480px) {
            body {
                align-items: flex-end;
                padding-bottom: 60px;
            }
            
            .welcome-box {
                padding: 25px 15px;
                max-width: 320px;
                margin-bottom: 30px;
            }
            
            h1 {
                font-size: 16px;
            }
            
            .features {
                flex-direction: column;
            }
            
            .feature {
                width: 100%;
                margin-bottom: 10px;
            }
        }

        /* إضافة ستايل للخلفية لجعل الصورة أكثر وضوحاً */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
           
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="welcome-box">
        <h1>قسم تكنولوجيا المعلومات والاتصالات والذكاء الاصطناعي</h1>
        <a href="{{ url_for('login') }}">تسجيل الدخول</a>
    </div>
</body>
</html>
