<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}نظام معلومات الموظفين{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #e1f5fe, #b3e5fc, #81d4fa, #4fc3f7, #29b6f6);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* شريط التنقل */
        .navbar-nav {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .nav-link-custom {
            color: #ffffff !important;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 8px 12px !important;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        
        .nav-link-custom:hover {
            background-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        .nav-btn {
            padding: 8px 15px !important;
            border-radius: 6px;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        
        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            border: none;
        }
        
        .btn-warning:hover {
            background: linear-gradient(135deg, #ff9800, #f57c00);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(255, 152, 0, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745, #218838);
            border: none;
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #218838, #1e7e34);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(40, 167, 69, 0.3);
        }
        
        .btn-outline-info {
            border: 1px solid #17a2b8;
            color: #17a2b8;
        }
        
        .btn-outline-info:hover {
            background-color: #17a2b8;
            color: white;
            transform: translateY(-2px);
        }
        
        .navbar-brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: white !important;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* حاوية الملفات */
        .file-input-container {
            position: relative;
            min-height: 45px;
            padding: 8px;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            background-color: #f8f9fa;
            margin-bottom: 10px;
        }

        .file-input-container .btn {
            margin-top: 0;
        }

        .file-name-display {
            display: none !important;
        }

        /* نافذة التكبير */
        #imageZoomModal {
            transition: opacity 0.3s ease;
        }
        .image-container {
            cursor: pointer;
            display: block;
        }
        #zoomedImage {
            transition: transform 0.3s ease;
        }
        .zoom-controls button:hover {
            transform: scale(1.1);
            transition: transform 0.2s;
        }
        #imageWrapper {
            overflow: visible;
        }
        
        /* رسائل التحقق من التكرار */
        .duplicate-error {
            font-size: 0.85rem;
            color: #dc3545;
            margin-top: 5px;
            display: none;
        }
        
        .duplicate-error.show {
            display: block;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .has-duplicate {
            border-color: #dc3545 !important;
        }
        
        .duplicate-checking::after {
            content: 'جارٍ التحقق...';
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            color: #6c757d;
        }
        
        /* ============ تحسينات الاستجابة للهواتف ============ */
        
        /* تحسينات عامة للهواتف */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
            
            .container {
                padding-left: 10px;
                padding-right: 10px;
                max-width: 100%;
            }
            
            .container.mt-4 {
                margin-top: 1rem !important;
                padding: 0 5px;
            }
            
            /* تحسين شريط التنقل للهاتف */
            .navbar-collapse {
                background-color: #343a40;
                border-radius: 8px;
                padding: 10px;
                margin-top: 10px;
            }
            
            .navbar-nav {
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 5px !important;
            }
            
            .nav-link-custom, .nav-btn {
                width: 100% !important;
                justify-content: flex-start !important;
                padding: 10px 12px !important;
                font-size: 0.9rem !important;
                margin: 2px 0 !important;
            }
            
            .btn-text {
                display: inline !important;
                font-size: 0.9rem !important;
                margin-right: 8px;
            }
            
            .navbar-toggler {
                padding: 5px 8px;
                font-size: 0.9rem;
            }
            
            /* تحسين الأزرار */
            .btn {
                padding: 10px 15px !important;
                font-size: 0.9rem !important;
                min-height: 44px;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                margin: 5px 0;
            }
            
            /* تحسين النماذج */
            .form-control, .form-select {
                font-size: 16px !important;
                padding: 10px !important;
                margin-bottom: 10px;
            }
            
            /* تحسين الجداول */
            .table-responsive {
                margin-left: -5px;
                margin-right: -5px;
                width: calc(100% + 10px);
            }
            
            table {
                font-size: 0.8rem !important;
            }
            
            th, td {
                padding: 8px 4px !important;
            }
            
            /* تحسين البطاقات */
            .card {
                margin-bottom: 10px;
            }
            
            .card-body {
                padding: 15px 10px !important;
            }
            
            /* تحسين العناوين */
            h1 {
                font-size: 1.4rem !important;
                margin-bottom: 15px !important;
            }
            
            h2 {
                font-size: 1.3rem !important;
                margin-bottom: 12px !important;
            }
            
            h3 {
                font-size: 1.1rem !important;
            }
            
            /* تحسين نافذة التكبير للهاتف */
            #imageZoomModal {
                padding: 5px;
            }
            
            #zoomedImage {
                max-width: 100vw;
                max-height: 80vh;
            }
            
            .zoom-controls {
                bottom: 15px !important;
                padding: 8px 15px !important;
            }
            
            .zoom-controls button {
                width: 40px !important;
                height: 40px !important;
                font-size: 16px !important;
            }
        }
        
        /* للشاشات الصغيرة جداً */
        @media (max-width: 576px) {
            .navbar-brand {
                font-size: 1rem !important;
            }
            
            .navbar-brand span {
                font-size: 0.9rem;
            }
            
            .container {
                padding-left: 8px !important;
                padding-right: 8px !important;
            }
            
            .nav-link-custom, .nav-btn {
                padding: 8px 10px !important;
                font-size: 0.85rem !important;
            }
            
            .btn {
                padding: 8px 12px !important;
                font-size: 0.85rem !important;
            }
            
            .form-control, .form-select {
                padding: 8px !important;
                font-size: 16px !important;
            }
            
            h1 {
                font-size: 1.3rem !important;
            }
            
            h2 {
                font-size: 1.2rem !important;
            }
        }
        
        /* للأجهزة اللوحية */
        @media (min-width: 769px) and (max-width: 992px) {
            .nav-link-custom, .nav-btn {
                padding: 6px 8px !important;
                font-size: 0.8rem !important;
            }
            
            .btn-text {
                display: inline;
                font-size: 0.8rem;
            }
        }
        
        /* إصلاح مشكلة التمرير الأفقي */
        html, body {
            overflow-x: hidden;
            width: 100%;
        }
        
        /* تحسين الوصول للهواتف */
        @media (hover: none) and (pointer: coarse) {
            .nav-link-custom:hover, .nav-btn:hover {
                transform: none;
            }
            
            .btn:hover {
                transform: none;
            }
            
            input, select, textarea, button, a {
                min-height: 44px;
            }
        }
    </style>
</head>
<body>

    <div class="container mt-4">
        {% block content %}{% endblock %}
        <div class="mt-3">
            <button type="button" class="btn btn-secondary" onclick="history.back();">
                <i class="fas fa-arrow-right"></i> العودة للخطوة السابقة
            </button>
        </div>
    </div>

    <!-- نافذة الزوم -->
    <div id="imageZoomModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999;">
        <div style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; padding:20px; box-sizing:border-box;">
            <div id="imageWrapper" style="position:relative; display:flex; justify-content:center; align-items:center; max-width:100%; max-height:100%;">
                <img id="zoomedImage" src="" style="max-width:95vw; max-height:95vh; object-fit:contain; border-radius:8px; box-shadow:0 0 30px rgba(255,255,255,0.2); cursor:move;">
            </div>
            
            <button onclick="closeZoomImage()" style="position:fixed; top:20px; right:20px; background:#ff4444; color:white; border:none; border-radius:50%; width:50px; height:50px; cursor:pointer; font-size:22px; z-index:10000;">✕</button>
            
            <div style="position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); padding:12px 24px; border-radius:30px; display:flex; gap:15px; z-index:10000;">
                <button onclick="zoomOut()" style="background:#2c5aa0; color:white; border:none; border-radius:50%; width:45px; height:45px; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;">−</button>
                <button onclick="resetZoom()" style="background:#6c757d; color:white; border:none; border-radius:20px; padding:0 20px; cursor:pointer; font-size:16px;">إعادة تعيين</button>
                <button onclick="zoomIn()" style="background:#2c5aa0; color:white; border:none; border-radius:50%; width:45px; height:45px; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center;">+</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- كود تخصيص أزرار رفع الملفات -->
    <script>
    function customizeAllFileInputs() {
      const fileInputs = document.querySelectorAll('input[type="file"]');
      
      fileInputs.forEach((fileInput) => {
        const parent = fileInput.parentElement;
        
        if (parent.querySelector('.custom-file-button')) {
          return;
        }
        
        const customButton = document.createElement('button');
        customButton.type = 'button';
        customButton.className = 'btn btn-outline-primary custom-file-button';
        customButton.innerHTML = '📎 اختر المرفق';
        
        const fileNameDisplay = document.createElement('span');
        fileNameDisplay.className = 'file-name-display';
        fileNameDisplay.style.display = 'none';
        
        parent.appendChild(fileNameDisplay);
        parent.appendChild(customButton);
        
        customButton.addEventListener('click', function() {
          fileInput.click();
        });
        
        fileInput.style.display = 'none';
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      customizeAllFileInputs();
    });

    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        if (mutation.addedNodes.length) {
          setTimeout(customizeAllFileInputs, 100);
        }
      });
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
    </script>

    <!-- كود خاصية التكبير والتصغير للصور -->
    <script>
    function openZoomImage(imageSrc) {
        const modal = document.getElementById('imageZoomModal');
        const zoomedImage = document.getElementById('zoomedImage');
        
        if (!modal || !zoomedImage) {
            return;
        }
        
        zoomedImage.src = imageSrc;
        zoomedImage.style.transform = 'scale(1)';
        zoomedImage.style.cursor = 'zoom-in';
        
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function zoomIn() {
        const zoomedImage = document.getElementById('zoomedImage');
        if (!zoomedImage) return;
        
        const currentScale = parseFloat(zoomedImage.style.transform.replace('scale(', '').replace(')', '')) || 1;
        const newScale = Math.min(currentScale + 0.3, 5);
        zoomedImage.style.transform = `scale(${newScale})`;
        zoomedImage.style.cursor = 'grab';
    }

    function zoomOut() {
        const zoomedImage = document.getElementById('zoomedImage');
        if (!zoomedImage) return;
        
        const currentScale = parseFloat(zoomedImage.style.transform.replace('scale(', '').replace(')', '')) || 1;
        const newScale = Math.max(currentScale - 0.3, 0.5);
        zoomedImage.style.transform = `scale(${newScale})`;
        
        if (newScale <= 1) {
            zoomedImage.style.cursor = 'zoom-in';
        }
    }

    function resetZoom() {
        const zoomedImage = document.getElementById('zoomedImage');
        if (zoomedImage) {
            zoomedImage.style.transform = 'scale(1)';
            zoomedImage.style.cursor = 'zoom-in';
        }
    }

    function closeZoomImage() {
        const modal = document.getElementById('imageZoomModal');
        if (modal) {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    }

    function printImage(imgId) {
        const imgElement = document.getElementById(imgId);
        if (!imgElement) return;
        
        const imgSrc = imgElement.src;
        const w = window.open("", "_blank");
        w.document.write(`
            <html>
                <head>
                    <title>طباعة الصورة</title>
                    <style>
                        body { 
                            margin: 0; 
                            padding: 20px; 
                            text-align: center;
                            background: white;
                        }
                        img { 
                            max-width: 100%; 
                            height: auto;
                            border: 1px solid #ddd;
                        }
                    </style>
                </head>
                <body>
                    <img src="${imgSrc}" />
                </body>
            </html>
        `);
        w.document.close();
        setTimeout(() => w.print(), 500);
    }

    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.image-container').forEach(container => {
            container.style.cursor = 'pointer';
            
            container.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                
                let imageSrc = this.getAttribute('data-image-src');
                if (!imageSrc) {
                    const img = this.querySelector('img');
                    if (img) imageSrc = img.src;
                }
                
                if (imageSrc) {
                    openZoomImage(imageSrc);
                }
            });
        });
        
        document.querySelectorAll('img').forEach(img => {
            if (img.width > 150 || img.height > 150) {
                if (!img.closest('.image-container') && !img.closest('a')) {
                    img.style.cursor = 'pointer';
                    img.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        openZoomImage(this.src);
                    });
                }
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeZoomImage();
            }
        });
        
        document.getElementById('imageZoomModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeZoomImage();
            }
        });
    });
    </script>

    <!-- كود منع التكرار -->
    <script>
    document.addEventListener('DOMContentLoaded', function () {
        console.log('📘 تفعيل منع تكرار الكتب (إضافة فقط)');

        function getCurrentTable() {
            const path = window.location.pathname.toLowerCase();
            if (path.includes('book')) return 'books';
            return null;
        }

        function isEditPage() {
            const path = window.location.pathname.toLowerCase();
            return path.includes('edit');
        }

        async function checkDuplicate(table, field, value) {
            try {
                const res = await fetch(
                    `/check_duplicate?table=${table}&field=${field}&value=${encodeURIComponent(value)}`
                );
                const data = await res.json();
                return data.exists;
            } catch (e) {
                console.error('خطأ فحص التكرار:', e);
                return false;
            }
        }

        function showDuplicateError(field, message) {
            const old = field.parentElement.querySelector('.duplicate-error');
            if (old) old.remove();

            const div = document.createElement('div');
            div.className = 'duplicate-error show';
            div.innerHTML = message;

            field.classList.add('has-duplicate');
            field.parentElement.appendChild(div);

            field.addEventListener('input', () => {
                field.classList.remove('has-duplicate');
                div.remove();
            }, { once: true });
        }

        async function validateBook() {
            const table = getCurrentTable();

            if (!table || isEditPage()) {
                return { hasError: false };
            }

            const bookNumber = document.querySelector('input[name="book_number"]');
            if (!bookNumber || !bookNumber.value.trim()) {
                return { hasError: false };
            }

            const exists = await checkDuplicate(
                'books',
                'book_number',
                bookNumber.value.trim()
            );

            if (exists) {
                showDuplicateError(
                    bookNumber,
                    '❌ رقم الكتاب موجود مسبقاً ولا يمكن إضافته مرة أخرى'
                );
                bookNumber.focus();
                return { hasError: true };
            }

            return { hasError: false };
        }

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async function (e) {
                const table = getCurrentTable();
                if (table !== 'books' || isEditPage()) return;

                e.preventDefault();

                const result = await validateBook();
                if (result.hasError) {
                    alert('⚠️ رقم الكتاب مكرر، يرجى إدخال رقم مختلف');
                    return false;
                }

                this.submit();
            });
        });

        const field = document.querySelector('input[name="book_number"]');
        if (field && !isEditPage()) {
            let timer;
            field.addEventListener('input', function () {
                clearTimeout(timer);
                timer = setTimeout(async () => {
                    if (!this.value.trim()) return;

                    const exists = await checkDuplicate(
                        'books',
                        'book_number',
                        this.value.trim()
                    );

                    if (exists) {
                        showDuplicateError(
                            this,
                            '❌ رقم الكتاب مستخدم مسبقاً'
                        );
                    }
                }, 800);
            });
        }

        console.log('✅ منع التكرار يعمل للإضافة فقط');
    });
    </script>

    <style>
    #imageZoomModal {
        z-index: 99999;
    }
    #zoomedImage {
        transition: transform 0.3s ease;
        max-width: 95vw;
        max-height: 95vh;
        object-fit: contain;
    }
    .zoom-controls {
        z-index: 100000;
    }
    </style>
</body>
</html>
